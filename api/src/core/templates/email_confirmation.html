<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your account</title>
</head>

<body>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" align="center">
        <tr>
            <td align="left" style="padding: 40px;">
                <h1 style="font-family: 'Montserrat', sans-serif; font-size: 24px; color: #141414;">Confirm your account
                </h1>
                <p style="font-family: 'Open Sans', sans-serif; font-size: 15px; color: #141414;">
                    Please click the button below to confirm your email address and finish setting up your account.
                    This link is valid for 24 hours.
                </p>
                <a href="{{ link }}"
                    style="background-color: #E11D48; padding: 12px 30px; color: white; font-weight: 700; font-size: 16px; text-decoration: none; border-radius: 40px;">
                    Confirm
                </a>
            </td>
        </tr>
    </table>
</body>

</html>
