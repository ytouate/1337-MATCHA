version: '3.8'

services:
    db:
        container_name: postgresql_db
        image: postgres:15
        env_file:
            - backend/.env
        restart: always
        ports:
            - "5432:5432"
        volumes:
            - matcha_data:/var/lib/postgresql/data
    web:
        depends_on:
            - db
        container_name: web
        build: backend
        restart: always
        ports:
            - "3000:3000"
        env_file:
            - backend/.env
        volumes:
            - ./backend:/app

volumes:
    matcha_data: